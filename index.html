<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worklog - Neubrutalism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-light: #f0f0f0;
            --summary-bg: #f9f9ec;
            --border: 1.5px solid var(--black);
        }

        body {
            background-color: var(--white);
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        .container {
            width: 100%;
            max-width: 550px;
        }

        /* Header */
        .header {
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Card Style */
        .card {
            border: var(--border);
            box-shadow: 4px 4px 0px var(--black);
            padding: 20px;
            margin-bottom: 25px;
            background: var(--white);
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input:not([type="checkbox"]), select {
            width: 100%;
            padding: 10px;
            border: var(--border);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 13px;
        }

        /* --- ปุ่มสไตล์ Yes / No (สลับขาวดำ) --- */
        .toggle-group {
            display: flex;
            border: var(--border);
            height: 38px;
            overflow: hidden;
        }

        .toggle-group input { display: none; }

        .toggle-group label {
            flex: 1;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }

        /* ฝั่ง Yes */
        .label-yes { background: var(--white); color: var(--black); }
        input:checked + .label-yes { background: var(--black); color: var(--white); }

        /* ฝั่ง No */
        .label-no { background: var(--black); color: var(--white); }
        input:checked ~ .label-no { background: var(--white); color: var(--black); }
        /* กรณีปกติที่ไม่ได้เช็ค ให้ No เป็นสีดำ */
        input:not(:checked) ~ .label-no { background: var(--black); color: var(--white); }

        /* Button Save */
        .btn-save {
            width: 100%;
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Table Section */
        .filter-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-row select { width: 100px; text-align: center; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 20px;
        }

        thead th {
            padding: 10px 5px;
            border-bottom: 1.5px solid var(--black);
            font-weight: 600;
        }

        tbody td {
            padding: 15px 5px;
            text-align: center;
            color: #444;
        }

        .btn-action {
            border: 1px solid var(--black);
            background: white;
            padding: 5px;
            cursor: pointer;
            margin: 0 2px;
        }

        /* Summary Box */
        .summary-card {
            background-color: var(--summary-bg);
            border: 1.5px solid #e0e0e0;
            padding: 20px;
            text-align: center;
        }

        .summary-details {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .total-text {
            font-size: 24px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">✦ DAILY WORKLOG ✦</div>

    <div class="card">
        <div class="input-grid">
            <div class="input-group">
                <label>วันที่</label>
                <input type="text" value="25 เม.ย. 2569">
            </div>
            <div class="input-group">
                <label>เวลาเข้า</label>
                <input type="time" id="in">
            </div>
            <div class="input-group">
                <label>เวลาออก</label>
                <input type="time" id="out">
            </div>
            <div class="input-group">
                <label>พัก (ชม.)</label>
                <input type="number" id="break" value="1">
            </div>
            <div class="input-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-group">
                    <input type="checkbox" id="ot">
                    <label for="ot" class="label-yes">Yes</label>
                    <label for="ot" class="label-no">No</label>
                </div>
            </div>
            <div class="input-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-group">
                    <input type="checkbox" id="close">
                    <label for="close" class="label-yes">Yes</label>
                    <label for="close" class="label-no">No</label>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="save()">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <div class="filter-row">
            <select><option>เมษายน</option></select>
            <select><option>2026</option></select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>เวลา</th>
                    <th>ชม.</th>
                    <th>OT</th>
                    <th>ปิดร้าน</th>
                    <th>รายได้</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>25/04</td>
                    <td>17:13-20:13</td>
                    <td>2.00</td>
                    <td>○</td>
                    <td>-</td>
                    <td><b>฿120</b></td>
                    <td>
                        <button class="btn-action">✎</button>
                        <button class="btn-action">🗑</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="summary-card">
            <div class="summary-details">
                <span>งาน ฿120</span>
                <span>ปิดร้าน ฿0</span>
                <span>ภาษี 5% -฿6</span>
            </div>
            <div class="total-text">รวมสุทธิ ฿114</div>
        </div>
    </div>
</div>

</body>
</html>
