<!DOCTYPE html>

<div class="card">
<input type="date" id="date">
<input type="time" id="in">
<input type="time" id="out">
<input type="number" id="break" value="1">

<input type="checkbox" id="ot" hidden>
<input type="checkbox" id="close" hidden>

<div>
<label>OT</label>
<div class="btn-group">
<button class="btn-toggle" onclick="setToggle('ot',true,this)">Yes</button>
<button class="btn-toggle active" onclick="setToggle('ot',false,this)">No</button>
</div>
</div>

<div>
<label>Close +40</label>
<div class="btn-group">
<button class="btn-toggle" onclick="setToggle('close',true,this)">Yes</button>
<button class="btn-toggle active" onclick="setToggle('close',false,this)">No</button>
</div>
</div>

<button class="btn" onclick="save()">Save</button>
</div>

<div class="card">
<div id="table"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
function setToggle(type,val,btn){
 document.getElementById(type).checked = val;
 btn.parentElement.querySelectorAll('.btn-toggle').forEach(b=>b.classList.remove('active'));
 btn.classList.add('active');
}
</script>
</body>
</html>
