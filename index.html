<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Worklog - Full System</title>
    
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --cream: #fdfdf5;
            --border-width: 2px;
            --shadow: 5px 5px 0px var(--black);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--white);
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: var(--black);
        }

        .container { width: 100%; max-width: 500px; }

        /* --- Header & User Section --- */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        #user-info { font-size: 13px; font-weight: 400; }

        .btn-logout {
            background: var(--white);
            border: 1.5px solid var(--black);
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
        }

        .main-title {
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 2px;
            margin: 20px 0 30px 0;
        }

        /* --- Card Design --- */
        .card {
            border: var(--border-width) solid var(--black);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 35px;
            background: var(--white);
        }

        /* --- Grid System --- */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input:not([type="checkbox"]), select {
            width: 100%;
            padding: 10px;
            border: var(--border-width) solid var(--black);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        /* --- Toggle Buttons (OT & ปิดร้าน) --- */
        .toggle-wrapper {
            display: flex;
            border: var(--border-thick) solid var(--black);
            height: 40px;
            overflow: hidden;
            border: 2px solid black;
        }

        .toggle-wrapper input { display: none; }

        .toggle-wrapper label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.1s;
        }

        /* สถานะ Default: No ดำ / Yes ขาว */
        .choice-yes { background: var(--white); color: var(--black); border-right: 1px solid black; }
        .choice-no { background: var(--black); color: var(--white); }

        /* เมื่อกดเลือก: สลับสี */
        input:checked + .choice-yes { background: var(--black); color: var(--white); }
        input:checked ~ .choice-no { background: var(--white); color: var(--black); }

        /* --- Save Button --- */
        .btn-save {
            width: 100%;
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 5px;
            font-family: inherit;
        }

        /* --- Table Section --- */
        .filter-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .filter-area select { width: auto; min-width: 110px; text-align: center; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 20px;
        }

        thead th {
            padding-bottom: 12px;
            border-bottom: 2px solid var(--black);
            font-weight: 600;
        }

        tbody td {
            padding: 18px 4px;
            text-align: center;
        }

        /* --- Action Buttons (✎ / 🗑) --- */
        .btn-action {
            background: var(--white);
            border: 1.5px solid var(--black);
            width: 35px;
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 0 2px;
        }

        /* --- Summary Section --- */
        .summary-box {
            background-color: var(--cream);
            border: 1px solid #e0e0e0;
            padding: 30px 20px;
            text-align: center;
            margin-top: 10px;
        }

        .summary-details {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            margin-bottom: 15px;
            color: #444;
        }

        .total-pay { font-size: 28px; font-weight: 600; }

        /* --- SweetAlert Neubrutalism Style --- */
        .brutal-popup {
            border: 2px solid black !important;
            border-radius: 0px !important;
            box-shadow: 4px 4px 0px black !important;
            font-family: 'Prompt', sans-serif !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-nav">
        <div id="user-info">ภัครีมา วังเมือง</div>
        <button class="btn-logout" onclick="location.reload()">Logout</button>
    </div>

    <div class="main-title">✦ DAILY WORKLOG ✦</div>

    <div class="card">
        <div class="input-grid">
            <div class="input-group">
                <label>วันที่</label>
                <input type="text" value="25 เม.ย. 2569">
            </div>
            <div class="input-group">
                <label>เวลาเข้า</label>
                <input type="time">
            </div>
            <div class="input-group">
                <label>เวลาออก</label>
                <input type="time">
            </div>
            <div class="input-group">
                <label>พัก (ชม.)</label>
                <input type="number" value="1">
            </div>
            
            <div class="input-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="ot-toggle">
                    <label for="ot-toggle" class="choice-yes">Yes</label>
                    <label for="ot-toggle" class="choice-no">No</label>
                </div>
            </div>

            <div class="input-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="close-toggle">
                    <label for="close-toggle" class="choice-yes">Yes</label>
                    <label for="close-toggle" class="choice-no">No</label>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="alertSuccess('เย้! บันทึกสำเร็จแล้ว')">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <div class="filter-area">
            <select><option>เมษายน</option></select>
            <select><option>2026</option></select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>เวลา</th>
                    <th>ชม.</th>
                    <th>OT</th>
                    <th>ปิดร้าน</th>
                    <th>รายได้</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>25/04</td>
                    <td>17:13-20:13</td>
                    <td>2.00</td>
                    <td>○</td>
                    <td>-</td>
                    <td><strong>฿120</strong></td>
                    <td>
                        <button class="btn-action" onclick="alertSuccess('อัปเดตเรียบร้อย!')">✎</button>
                        <button class="btn-action" onclick="confirmDelete()">🗑</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="summary-box">
            <div class="summary-details">
                <span>งาน ฿120</span>
                <span>ปิดร้าน ฿0</span>
                <span>ภาษี 5% -฿6</span>
            </div>
            <div class="total-pay">รวมสุทธิ ฿114</div>
        </div>
    </div>
</div>

<script>
    // ฟังก์ชันแจ้งเตือน Toast (มุมขวาบน)
    function alertSuccess(msg) {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2500,
            customClass: { popup: 'brutal-popup' }
        });
        Toast.fire({ icon: 'success', title: msg });
    }

    // ฟังก์ชันยืนยันการลบ (Modal กลางจอ)
    function confirmDelete() {
        Swal.fire({
            title: 'จะลบจริงๆ หรอ?',
            text: "ลบแล้วกู้คืนไม่ได้น้า!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#000',
            confirmButtonText: 'ลบเลย',
            cancelButtonText: 'ยกเลิก',
            customClass: { popup: 'brutal-popup' }
        }).then((result) => {
            if (result.isConfirmed) {
                alertSuccess('ลบข้อมูลแล้วจ้า');
            }
        });
    }
</script>

</body>
</html>
