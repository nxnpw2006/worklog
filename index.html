<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Worklog - Neubrutalism Full Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-color: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-color: #000000;
            --border-thick: 2px;
            --shadow: 5px 5px 0px #000000;
            --cream-bg: #fdfdf5;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; transition: 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .container { width: 100%; max-width: 600px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- User Header Section --- */
        .user-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .user-name { font-size: 14px; font-weight: 400; }
        .btn-logout {
            background: white;
            border: 1px solid black;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .btn-logout:hover { background: #000; color: #fff; }

        h2 { text-align: center; font-weight: 600; letter-spacing: 2px; margin-bottom: 30px; }

        /* --- Card & Forms --- */
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border: var(--border-thick) solid black; 
            margin-bottom: 25px; 
            box-shadow: var(--shadow); 
        }

        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: 600; font-size: 11px; text-transform: uppercase; }
        
        input, select { 
            padding: 10px; 
            border: var(--border-thick) solid black; 
            outline: none; 
            font-size: 13px;
            background: white;
        }

        /* --- Neubrutalism Toggle Buttons --- */
        .toggle-group { 
            display: flex; 
            border: var(--border-thick) solid black; 
            height: 38px; 
            overflow: hidden; 
        }
        .btn-toggle { 
            flex: 1; 
            border: none; 
            background: white; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 600;
        }
        /* เมื่อ Active ให้พื้นหลังดำ ตัวหนังสือขาว */
        .btn-toggle.active { background: black !important; color: white !important; }
        .btn-toggle:first-child { border-right: 1px solid black; }

        .btn-main { 
            width: 100%; 
            padding: 15px; 
            background: black; 
            color: white; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 20px;
            font-size: 14px;
        }
        .btn-main:hover { opacity: 0.8; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px rgba(0,0,0,0.2); }

        /* --- Table Styling --- */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { padding: 12px; border-bottom: 2px solid black; text-align: center; }
        td { padding: 15px 5px; text-align: center; border-bottom: 1px solid #eee; }
        
        .action-btn { 
            background: white; 
            border: 1.5px solid black; 
            cursor: pointer; 
            padding: 5px; 
            width: 32px;
            height: 42px; /* ทรงสูงตามดีไซน์ */
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover { background: #f0f0f0; }

        /* --- Summary Box --- */
        .summary-box { 
            background: var(--cream-bg); 
            padding: 25px; 
            border: 1px solid #ddd; 
            margin-top: 20px; 
            text-align: center;
        }
        .summary-details { display: flex; justify-content: space-around; font-size: 12px; color: #666; margin-bottom: 10px; }
        .net-income { font-size: 26px; font-weight: 600; color: black; }

        /* Custom Swal */
        .swal2-popup { border: 2px solid black !important; border-radius: 0px !important; box-shadow: 4px 4px 0px black !important; font-family: 'Prompt', sans-serif !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-bar">
        <span class="user-name">ภัครีมา วังเมือง</span>
        <button class="btn-logout" onclick="location.reload()">Logout</button>
    </div>

    <h2>✦ DAILY WORKLOG ✦</h2>

    <div class="card">
        <div class="form-grid">
            <div class="form-group"><label>วันที่</label><input type="date" id="workDate"></div>
            <div class="form-group"><label>เวลาเข้า</label><input type="time" id="timeIn"></div>
            <div class="form-group"><label>เวลาออก</label><input type="time" id="timeOut"></div>
            <div class="form-group"><label>พัก (ชม.)</label><input type="number" id="breakHr" value="1"></div>
            
            <div class="form-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-group" id="otGroup">
                    <button type="button" class="btn-toggle" onclick="updateToggle('ot', true, 0)">Yes</button>
                    <button type="button" class="btn-toggle active" onclick="updateToggle('ot', false, 1)">No</button>
                </div>
            </div>

            <div class="form-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-group" id="closeGroup">
                    <button type="button" class="btn-toggle" onclick="updateToggle('close', true, 0)">Yes</button>
                    <button type="button" class="btn-toggle active" onclick="updateToggle('close', false, 1)">No</button>
                </div>
            </div>
        </div>
        <input type="hidden" id="editIndex" value="-1">
        <button class="btn-main" onclick="saveData()" id="btnSave">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:20px;">
            <select id="filterMonth" onchange="renderTable()"></select>
            <select id="filterYear" onchange="renderTable()"></select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>วันที่</th>
                        <th>เวลา</th>
                        <th>ชม.</th>
                        <th>OT</th>
                        <th>ปิดร้าน</th>
                        <th>รายได้</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>

        <div class="summary-box" id="monthlySummary"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('worklogs')) || [];
    let state = { ot: false, close: false };
    const HOURLY_RATE = 60;

    const Toast = Swal.mixin({
        toast: true, position: 'top-end', showConfirmButton: false, timer: 2000,
        customClass: { popup: 'swal2-popup' }
    });

    function init() {
        const now = new Date();
        document.getElementById('workDate').valueAsDate = now;

        const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        const mSelect = document.getElementById('filterMonth');
        months.forEach((m, i) => {
            let opt = new Option(m, i + 1);
            if(i + 1 === now.getMonth() + 1) opt.selected = true;
            mSelect.add(opt);
        });

        const ySelect = document.getElementById('filterYear');
        for(let y = 2025; y <= 2027; y++) {
            let opt = new Option(y, y);
            if(y === now.getFullYear()) opt.selected = true;
            ySelect.add(opt);
        }

        renderTable();
        lucide.createIcons();
    }

    // ฟังก์ชันจัดการปุ่มสลับ Yes/No
    function updateToggle(type, val, btnIdx) {
        state[type] = val;
        const group = type === 'ot' ? 'otGroup' : 'closeGroup';
        const btns = document.getElementById(group).querySelectorAll('.btn-toggle');
        btns.forEach(b => b.classList.remove('active'));
        btns[btnIdx].classList.add('active');
    }

    function saveData() {
        const dateVal = document.getElementById('workDate').value;
        const tIn = document.getElementById('timeIn').value;
        const tOut = document.getElementById('timeOut').value;
        const brk = parseFloat(document.getElementById('breakHr').value) || 0;
        const editIdx = parseInt(document.getElementById('editIndex').value);

        if(!dateVal || !tIn || !tOut) return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ!', customClass: {popup: 'swal2-popup'} });

        const start = new Date(`2000-01-01T${tIn}`);
        const end = new Date(`2000-01-01T${tOut}`);
        let diff = (end - start) / (1000 * 60 * 60);
        if (diff < 0) diff += 24;
        const hrs = Math.max(0, diff - brk);
        
        const incomeNormal = hrs * HOURLY_RATE;
        const incomeOT = state.ot ? incomeNormal : 0;
        const closePay = state.close ? 40 : 0;
        const total = (state.ot ? incomeNormal * 2 : incomeNormal) + closePay;

        const dateObj = new Date(dateVal);
        const entry = { 
            date: dateVal, 
            month: dateObj.getMonth() + 1, 
            year: dateObj.getFullYear(),
            tIn, tOut, hrs: hrs.toFixed(2), 
            isOT: state.ot, isClose: state.close, 
            closePay, total 
        };

        if (editIdx > -1) {
            db[editIdx] = entry;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('btnSave').innerText = "บันทึกข้อมูลวันนี้";
            Toast.fire({ icon: 'success', title: 'อัปเดตข้อมูลแล้ว' });
        } else {
            db.push(entry);
            Toast.fire({ icon: 'success', title: 'บันทึกสำเร็จ!' });
        }

        localStorage.setItem('worklogs', JSON.stringify(db));
        renderTable();
        document.getElementById('timeIn').value = "";
        document.getElementById('timeOut').value = "";
    }

    function renderTable() {
        const fM = parseInt(document.getElementById('filterMonth').value);
        const fY = parseInt(document.getElementById('filterYear').value);
        const tbody = document.getElementById('logTableBody');
        tbody.innerHTML = "";
        
        let sumWork = 0, sumClose = 0;

        db.forEach((item, index) => {
            if(item.month === fM && item.year === fY) {
                sumWork += (item.total - item.closePay);
                sumClose += item.closePay;

                tbody.innerHTML += `<tr>
                    <td>${item.date.split('-').reverse().slice(0,2).join('/')}</td>
                    <td>${item.tIn}-${item.tOut}</td>
                    <td>${item.hrs}</td>
                    <td>${item.isOT ? '●' : '○'}</td>
                    <td>${item.isClose ? '฿40' : '-'}</td>
                    <td style="font-weight:600">฿${item.total.toLocaleString()}</td>
                    <td>
                        <button class="action-btn" onclick="editEntry(${index})"><i data-lucide="edit-3" style="width:14px"></i></button>
                        <button class="action-btn" onclick="deleteEntry(${index})"><i data-lucide="trash-2" style="width:14px"></i></button>
                    </td>
                </tr>`;
            }
        });

        const tax = (sumWork + sumClose) * 0.05;
        const net = (sumWork + sumClose) - tax;

        document.getElementById('monthlySummary').innerHTML = `
            <div class="summary-details">
                <span>งาน ฿${sumWork.toLocaleString()}</span>
                <span>ปิดร้าน ฿${sumClose.toLocaleString()}</span>
                <span>ภาษี 5% -฿${tax.toLocaleString()}</span>
            </div>
            <div class="net-income">รวมสุทธิ ฿${net.toLocaleString()}</div>
        `;
        lucide.createIcons();
    }

    function deleteEntry(index) {
        Swal.fire({
            title: 'จะลบจริงๆ หรอ?', icon: 'warning', showCancelButton: true,
            confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก',
            customClass: { popup: 'swal2-popup' }
        }).then((res) => {
            if(res.isConfirmed) {
                db.splice(index, 1);
                localStorage.setItem('worklogs', JSON.stringify(db));
                renderTable();
                Toast.fire({ icon: 'success', title: 'ลบแล้วจ้า' });
            }
        });
    }

    function editEntry(index) {
        const item = db[index];
        document.getElementById('workDate').value = item.date;
        document.getElementById('timeIn').value = item.tIn;
        document.getElementById('timeOut').value = item.tOut;
        document.getElementById('breakHr').value = item.breakHr || 1;
        document.getElementById('editIndex').value = index;
        document.getElementById('btnSave').innerText = "อัปเดตข้อมูล";
        
        updateToggle('ot', item.isOT, item.isOT ? 0 : 1);
        updateToggle('close', item.isClose, item.isClose ? 0 : 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    init();
</script>
</body>
</html>
