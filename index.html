<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Work Tracker</title>

  <!-- 👇 ใส่ CSS ตรงนี้ -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #efefef;
      margin: 0;
    }

    .container {
      max-width: 950px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border: 3px solid #000;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 6px 6px 0px #ccc;
    }

    .row {
      display: flex;
      gap: 20px;
      margin-bottom: 15px;
    }

    .col {
      flex: 1;
    }

    label {
      font-weight: bold;
      margin-bottom: 6px;
      display: block;
    }

    .input {
      width: 100%;
      padding: 12px;
      border: 2px solid #000;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: black;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 15px;
    }

    .toggle {
      display: flex;
      border: 2px solid black;
    }

    .toggle button {
      flex: 1;
      padding: 10px;
      border: none;
      background: white;
    }

    .toggle button:first-child {
      border-right: 2px solid black;
    }

    .active {
      background: black !important;
      color: white;
    }

    .summary {
      background: #e8e6dc;
      border: 3px solid black;
      padding: 30px;
      text-align: center;
      font-size: 24px;
    }
  </style>

</head>

<body>

<div class="container">

  <div class="card">

    <div class="row">
      <div class="col">
        <label>วันที่</label>
        <input type="date" class="input">
      </div>

      <div class="col">
        <label>เวลาเข้า</label>
        <input type="time" class="input">
      </div>

      <div class="col">
        <label>เวลาออก</label>
        <input type="time" class="input">
      </div>
    </div>

    <div class="row">
      <div class="col">
        <label>พัก (ชม.)</label>
        <input type="number" class="input" value="1">
      </div>

      <div class="col">
        <label>OT</label>
        <div class="toggle">
          <button onclick="setToggle(this)">Yes</button>
          <button class="active" onclick="setToggle(this)">No</button>
        </div>
      </div>

      <div class="col">
        <label>ปิดร้าน</label>
        <div class="toggle">
          <button onclick="setToggle(this)">Yes</button>
          <button class="active" onclick="setToggle(this)">No</button>
        </div>
      </div>
    </div>

    <button class="btn">บันทึกข้อมูลวันนี้</button>

  </div>

  <div class="card">
    <div class="summary">
      รวมสุทธิ ฿0
    </div>
  </div>

</div>

<!-- 👇 JS อยู่ล่างสุด -->
<script>
function setToggle(btn) {
  const parent = btn.parentElement;
  [...parent.children].forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}
</script>

</body>
</html>
