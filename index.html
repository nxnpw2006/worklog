<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worklog - Neubrutalism</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --yellow-light: #fdfdf2;
            --border: 2px solid #000000;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--white);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* User & Logout Top Bar */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        #user { font-size: 14px; }

        .btn-logout {
            background: white;
            border: 1px solid black;
            padding: 5px 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }

        /* Title */
        .title {
            text-align: center;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Card Style */
        .card {
            border: var(--border);
            box-shadow: 5px 5px 0px var(--black);
            padding: 25px;
            margin-bottom: 35px;
            background: white;
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input:not([type="checkbox"]), select {
            width: 100%;
            padding: 10px;
            border: var(--border);
            font-family: inherit;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        /* Toggle Button (Yes/No) */
        .toggle-container {
            display: flex;
            border: var(--border);
            height: 40px;
            overflow: hidden;
        }

        .toggle-container input { display: none; }

        .toggle-container label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.1s;
        }

        /* Style: No is black by default */
        .lab-yes { background: white; color: black; }
        .lab-no { background: black; color: white; }

        /* When checked: Yes becomes black */
        input:checked + .lab-yes { background: black; color: white; }
        input:checked ~ .lab-no { background: white; color: black; }

        /* Save Button */
        .btn-save {
            width: 100%;
            background: black;
            color: white;
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .filter-section select { width: auto; min-width: 120px; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-bottom: 20px;
        }

        th {
            border-bottom: 1.5px solid black;
            padding: 10px 0;
            font-weight: 600;
            text-align: center;
        }

        td {
            padding: 20px 0;
            text-align: center;
            vertical-align: middle;
        }

        /* Action Buttons (Edit/Delete) */
        .action-cell {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .btn-icon {
            background: white;
            border: 1.5px solid black;
            width: 35px; /* กว้าง */
            height: 45px; /* สูงเป็นสี่เหลี่ยมผืนผ้าแนวนอน */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        .btn-icon img, .btn-icon svg { width: 18px; height: 18px; }

        /* Summary Box */
        .summary-box {
            background-color: var(--yellow-light);
            border: 1px solid #e0e0e0;
            padding: 30px 20px;
            text-align: center;
            margin-top: 10px;
        }

        .summary-info {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .total-pay {
            font-size: 28px;
            font-weight: 600;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div id="user">ภัครีมา วังเมือง</div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="title">✦ DAILY WORKLOG ✦</div>

    <div class="card">
        <div class="input-grid">
            <div class="input-group">
                <label>วันที่</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>เวลาเข้า</label>
                <input type="time" id="in">
            </div>
            <div class="input-group">
                <label>เวลาออก</label>
                <input type="time" id="out">
            </div>
            <div class="input-group">
                <label>พัก (ชม.)</label>
                <input type="number" id="break" value="1">
            </div>
            <div class="input-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-container">
                    <input type="checkbox" id="ot">
                    <label for="ot" class="lab-yes">Yes</label>
                    <label for="ot" class="lab-no">No</label>
                </div>
            </div>
            <div class="input-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-container">
                    <input type="checkbox" id="close">
                    <label for="close" class="lab-yes">Yes</label>
                    <label for="close" class="lab-no">No</label>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="save()">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <div class="filter-section">
            <select id="month-select"><option>เมษายน</option></select>
            <select id="year-select"><option>2026</option></select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>เวลา</th>
                    <th>ชม.</th>
                    <th>OT</th>
                    <th>ปิดร้าน</th>
                    <th>รายได้</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="table-content">
                <tr>
                    <td>25/04</td>
                    <td>17:13-20:13</td>
                    <td>2.00</td>
                    <td>○</td>
                    <td>-</td>
                    <td><strong>฿120</strong></td>
                    <td>
                        <div class="action-cell">
                            <button class="btn-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="btn-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="summary-box">
            <div class="summary-info">
                <span>งาน ฿0</span>
                <span>ปิดร้าน ฿0</span>
                <span>ภาษี 5% -฿0</span>
            </div>
            <div class="total-pay">รวมสุทธิ ฿0</div>
        </div>
    </div>
</div>

</body>
</html>
