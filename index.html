<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worklog - Neubrutalism Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --summary-bg: #fdfdf5; /* สีเหลืองนวลตามรูป */
            --border-thick: 2px;
        }

        body {
            background-color: var(--white);
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
            color: var(--black);
        }

        .container { width: 100%; max-width: 550px; }

        /* ส่วนหัว */
        .user-nav {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-logout {
            background: var(--white);
            border: 1.5px solid var(--black);
            padding: 3px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .header-title {
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        /* Card Component */
        .card {
            border: var(--border-thick) solid var(--black);
            box-shadow: 5px 5px 0px var(--black); /* เงาคมชัดสไตล์ Neubrutalism */
            padding: 25px;
            margin-bottom: 35px;
            background: var(--white);
        }

        /* Input Grid */
        .input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input:not([type="checkbox"]), select {
            width: 100%;
            padding: 10px;
            border: var(--border-thick) solid var(--black);
            font-family: inherit;
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        /* --- จุดที่ปรับปรุง: ปุ่ม Yes/No สไตล์สลับสี --- */
        .toggle-box {
            display: flex;
            border: var(--border-thick) solid var(--black);
            height: 40px;
            overflow: hidden;
        }

        .toggle-box input { display: none; }

        .toggle-box label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.1s;
        }

        /* สถานะเริ่มต้น: No เป็นสีดำ, Yes เป็นสีขาว */
        .lab-yes { background: var(--white); color: var(--black); border-right: 1px solid var(--black); }
        .lab-no { background: var(--black); color: var(--white); }

        /* เมื่อติ๊ก (Checked): Yes กลายเป็นสีดำ, No กลายเป็นสีขาว */
        input:checked + .lab-yes { background: var(--black); color: var(--white); }
        input:checked ~ .lab-no { background: var(--white); color: var(--black); }

        /* ปุ่มบันทึกสีดำสนิท */
        .btn-save {
            width: 100%;
            background: var(--black);
            color: var(--white);
            border: none;
            padding: 15px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
        }

        /* Table & Action Buttons */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            margin-top: 15px;
        }

        th { border-bottom: 1.5px solid var(--black); padding-bottom: 12px; }
        td { padding: 18px 5px; text-align: center; }

        .btn-icon {
            background: var(--white);
            border: 1.5px solid var(--black);
            width: 35px; /* ทรงสูงตามรูป */
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 0 2px;
            padding: 0;
        }

        /* Summary Section */
        .summary-card {
            background-color: var(--summary-bg);
            border: 1px solid #e0e0e0;
            padding: 30px 20px;
            text-align: center;
            margin-top: 10px;
        }

        .summary-grid {
            display: flex;
            justify-content: space-around;
            font-size: 12px;
            margin-bottom: 15px;
            color: #555;
        }

        .total-amount { font-size: 28px; font-weight: 600; }

        /* Custom SweetAlert Style */
        .swal2-popup-brutal {
            border: 2.5px solid black !important;
            border-radius: 0px !important;
            box-shadow: 5px 5px 0px black !important;
            font-family: 'Prompt', sans-serif !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="user-nav">
        <div id="user">ภัครีมา วังเมือง</div>
        <button class="btn-logout">Logout</button>
    </div>

    <div class="header-title">✦ DAILY WORKLOG ✦</div>

    <div class="card">
        <div class="input-grid">
            <div class="input-group">
                <label>วันที่</label>
                <input type="text" value="25 เม.ย. 2569">
            </div>
            <div class="input-group">
                <label>เวลาเข้า</label>
                <input type="time">
            </div>
            <div class="input-group">
                <label>เวลาออก</label>
                <input type="time">
            </div>
            <div class="input-group">
                <label>พัก (ชม.)</label>
                <input type="number" value="1">
            </div>
            
            <div class="input-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-box">
                    <input type="checkbox" id="ot">
                    <label for="ot" class="lab-yes">Yes</label>
                    <label for="ot" class="lab-no">No</label>
                </div>
            </div>

            <div class="input-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-box">
                    <input type="checkbox" id="close">
                    <label for="close" class="lab-yes">Yes</label>
                    <label for="close" class="lab-no">No</label>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="toastAlert('เย้! บันทึกสำเร็จแล้ว')">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:center; gap:12px; margin-bottom:20px;">
            <select style="width:120px;"><option>เมษายน</option></select>
            <select style="width:120px;"><option>2026</option></select>
        </div>

        <table>
            <thead>
                <tr>
                    <th>วันที่</th>
                    <th>เวลา</th>
                    <th>ชม.</th>
                    <th>OT</th>
                    <th>ปิดร้าน</th>
                    <th>รายได้</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>25/04</td>
                    <td>17:13-20:13</td>
                    <td>2.00</td>
                    <td>○</td>
                    <td>-</td>
                    <td><strong>฿120</strong></td>
                    <td>
                        <button class="btn-icon" onclick="toastAlert('อัปเดตเรียบร้อย!')">✎</button>
                        <button class="btn-icon" onclick="confirmDelete()">🗑</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="summary-card">
            <div class="summary-grid">
                <span>งาน ฿120</span>
                <span>ปิดร้าน ฿0</span>
                <span>ภาษี 5% -฿6</span>
            </div>
            <div class="total-amount">รวมสุทธิ ฿114</div>
        </div>
    </div>
</div>

<script>
    // แจ้งเตือนแบบ Toast (มุมขวาบน)
    function toastAlert(message) {
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            customClass: { popup: 'swal2-popup-brutal' }
        });
        Toast.fire({ icon: 'success', title: message });
    }

    // แจ้งเตือนยืนยันการลบ (กลางจอ)
    function confirmDelete() {
        Swal.fire({
            title: 'จะลบจริงๆ หรอ?',
            text: "ลบแล้วกู้คืนไม่ได้น้า!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#000',
            confirmButtonText: 'ลบเลย',
            cancelButtonText: 'ยกเลิก',
            customClass: { popup: 'swal2-popup-brutal' }
        }).then((result) => {
            if (result.isConfirmed) {
                toastAlert('ลบข้อมูลแล้วจ้า');
            }
        });
    }
</script>

</body>
</html>
