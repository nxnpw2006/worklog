<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worklog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="header-section">
        <h2>DAILY WORKLOG</h2>
        <div id="user"></div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>

    <div class="card input-section">
        <div class="input-grid">
            <div class="input-group">
                <label>วันที่</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>เวลาเข้า</label>
                <input type="time" id="in">
            </div>
            <div class="input-group">
                <label>เวลาออก</label>
                <input type="time" id="out">
            </div>
            <div class="input-group">
                <label>พัก (ชม.)</label>
                <input type="number" id="break" value="1">
            </div>
            <div class="input-group">
                <label>OT (2 แรง)</label>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="ot" hidden>
                    <label for="ot" class="toggle-btn"></label>
                </div>
            </div>
            <div class="input-group">
                <label>ปิดร้าน (40.-)</label>
                <div class="toggle-wrapper">
                    <input type="checkbox" id="close" hidden>
                    <label for="close" class="toggle-btn"></label>
                </div>
            </div>
        </div>
        <button class="btn-save" onclick="save()">บันทึกข้อมูลวันนี้</button>
    </div>

    <div class="card table-section">
        <div class="filter-row">
            <select id="month-select"></select>
            <select id="year-select"></select>
        </div>
        
        <div id="table">
            </div>

        <div class="summary-box">
             <div class="summary-grid">
                <span>งาน ฿0</span>
                <span>ปิดร้าน ฿0</span>
                <span>ภาษี 5% -฿0</span>
             </div>
             <div class="total-amount">รวมสุทธิ ฿0</div>
        </div>
    </div>
</div>

</body>
</html>
