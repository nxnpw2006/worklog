<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worklog</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #FFFFFF;
    --text-color: #000;
    --border: 2px solid #000;
}

body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 900px;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    border: 3px solid #000;
    padding: 25px;
    margin-bottom: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
    gap: 15px;
}

input {
    padding: 10px;
    border: var(--border);
}

.btn-main {
    margin-top: 20px;
    width: 100%;
    padding: 15px;
    background: black;
    color: white;
    border: var(--border);
    cursor: pointer;
}

.btn-group {
    display: flex;
    border: var(--border);
}

.btn-toggle {
    flex: 1;
    padding: 8px;
    cursor: pointer;
    border: none;
    background: white;
}

.btn-toggle.active {
    background: black;
    color: white;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border-bottom: 1px solid #ccc;
    padding: 12px;
    text-align: center;
}

</style>
</head>

<body>

<div class="container">

<h2>✦ DAILY WORKLOG ✦</h2>

<div id="user"></div>
<button onclick="logout()">Logout</button>

<div class="card">
<div class="form-grid">

<input type="date" id="date">
<input type="time" id="in">
<input type="time" id="out">
<input type="number" id="break" value="1">

<div>
<label>OT</label>
<div class="btn-group">
<button class="btn-toggle" onclick="setToggle('ot', true, this)">Yes</button>
<button class="btn-toggle active" onclick="setToggle('ot', false, this)">No</button>
</div>
</div>

<div>
<label>Close +40</label>
<div class="btn-group">
<button class="btn-toggle" onclick="setToggle('close', true, this)">Yes</button>
<button class="btn-toggle active" onclick="setToggle('close', false, this)">No</button>
</div>
</div>

</div>

<button class="btn-main" onclick="save()">Save</button>

</div>

<div class="card">
<div id="table"></div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- App -->
<script src="firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/db.js"></script>
<script src="js/calc.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<script>
// toggle UI (เพิ่มให้ใช้กับของเดิม)
let state = { ot:false, close:false }

function setToggle(type, val, btn){
    state[type] = val
    btn.parentElement.querySelectorAll('.btn-toggle')
        .forEach(b => b.classList.remove('active'))
    btn.classList.add('active')

    // sync checkbox เดิม
    document.getElementById(type).checked = val
}
</script>

</body>
</html>
